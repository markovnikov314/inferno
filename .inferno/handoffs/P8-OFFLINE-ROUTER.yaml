implementation:
  - Added a P8 offline serving-policy replay evaluator, CLI command, Makefile target, config, docs, tests, and artifacts.
  - Evaluator loads only existing validated study artifacts matching the configured environment fingerprint and comparison type.
  - Replay groups requests by workload block and uses leave-one-workload-block-out training to avoid random request leakage.
  - Decision logs include request features, candidate profiles, held-out actuals, train blocks/runs, and policy decisions.
  - Evaluated static vLLM, static SGLang, transparent heuristic, non-deployable oracle lower bound, and proposed policy.
  - Omitted static llama.cpp in strict scope because llama.cpp remains deployment-profile only.
  - Added leakage and ablation checks without adding a live router, endpoint, dashboard, cloud control plane, new engine launch, or P9+ work.
