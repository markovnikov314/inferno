implementation:
  - Added a pinned llama.cpp CUDA engine config using ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:62a1d4e144789aa3dd6948d350388fd4b9ac4d12744f33213a89c4e5a9af25df.
  - Added P6 GGUF, quantization, tokenizer-format, and weight-format manifest fields without invalidating existing P4/P5 artifacts.
  - Added llama.cpp launcher support with --hf-repo, --hf-file, --alias, cache mounts, health checks, version evidence, raw SSE capture, telemetry, summary, checksums, and validation.
  - Added deployment-profile compare mode with the mandatory banner and non-matching controlled variable table.
  - Kept strict mode separate and explicitly rejecting llama.cpp.
  - Added parser support for llama.cpp/Qwen stream chunks emitted as delta.reasoning_content.
  - Did not add planner, router, dashboard, cloud control plane, live routing, or P7/P8 decision modules.
