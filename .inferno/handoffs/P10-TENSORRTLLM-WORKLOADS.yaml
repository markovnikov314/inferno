limitations:
  - Current TensorRT-LLM release with Qwen still does not pass on Tesla T4.
  - Legacy T4 TensorRT-LLM evidence uses TensorRT-LLM 0.11.0, TinyLlama, and the LLM API, not current `trtllm-serve`.
  - No TensorRT-LLM strict, winner, or current-release Qwen serving claim was made.
  - Current TensorRT-LLM should be rerun on an officially supported GPU family before making current-release or Qwen claims.
  - Generated artifacts under artifacts/ remain ignored by Git and are referenced here by relative path only.
