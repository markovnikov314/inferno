implementation:
  - Added TensorRT-LLM as pinned NVIDIA engine profiles: current `trtllm-serve` for supported newer GPUs and legacy T4 `LLM` API for Tesla T4.
  - Added P10 TensorRT-LLM workload and study configs with expanded workload parameters.
  - Extended the artifact contract and comparison key with optional workload, cost, and runtime knob metadata while preserving old artifacts.
  - Added TensorRT-LLM launch, request, metrics, logging, summary, checksum, validation, and fake-test support.
  - Added one-shot legacy TensorRT-LLM artifact capture for versions without `trtllm-serve`.
  - Added engine-configuration comparison/report validation and kept strict mode limited to the existing vLLM/SGLang envelope.
  - Flowed expanded workload metadata into planner, router, and hardening inputs where applicable.
  - Added P10 docs and ADR.
