schema_version: 1
phase: P11
principle: use the minimum external surface needed for local dashboard evidence
allowed:
  official_documentation_research: read_only
  github: read_only
  hugging_face_metadata: read_only
  npm_registry_for_dashboard_dependencies: read_only_or_install
  docker_registry_metadata_for_pinned_images: read_only
  ssh_gpu_preflight: operator_supplied_target_only
  ssh_gpu_dashboard_smoke: operator_supplied_target_only
disallowed:
  - broad cloud administration
  - secret storage in repository
  - Slack, Notion, or generic database integrations
  - public serving control plane
  - live routing service
