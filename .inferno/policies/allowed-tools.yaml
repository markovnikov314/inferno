schema_version: 1
phase: P11
allowed:
  local:
    - git
    - uv
    - python
    - pytest
    - ruff
    - npm install  # cwd: web/dashboard
    - npm run build  # cwd: web/dashboard
    - npm run dev  # cwd: web/dashboard
    - docker --version
  local_dashboard:
    - uv run python -m inferno.cli dashboard
    - uv run python -m inferno.cli dashboard --no-open
    - uv run python -m inferno.cli dashboard --smoke --no-open
  remote_gpu_preflight:
    - uname
    - cat /etc/os-release
    - python3 --version
    - python --version
    - git --version
    - docker --version
    - docker info
    - nvidia-smi
    - nvidia-smi --query-gpu=name,driver_version,memory.total,compute_cap --format=csv,noheader,nounits
    - docker run --rm --gpus all nvidia/cuda:* nvidia-smi
  remote_gpu_engines:
    - docker pull vllm/vllm-openai@sha256:*
    - docker pull lmsysorg/sglang@sha256:*
    - docker pull ghcr.io/ggml-org/llama.cpp:*@sha256:*
    - docker pull nvcr.io/nvidia/tensorrt-llm/release:*@sha256:*
    - docker pull nvcr.io/nvidia/tritonserver:*@sha256:*
    - docker pull ollama/ollama@sha256:*
    - docker run --gpus all --name inferno-* *
    - docker exec inferno-p11-ollama ollama pull qwen3.5:2b
    - curl http://127.0.0.1:*/v1/models
    - curl http://127.0.0.1:*/v1/chat/completions
    - docker logs inferno-*
    - docker rm -f inferno-*
forbidden:
  - public live endpoint
  - cloud control plane
  - live router or autoscaler
  - benchmark suite execution outside declared smoke/study configs
  - committing literal SSH targets, usernames, hostnames, private IPs, tokens, or private prompts
  - model weights
