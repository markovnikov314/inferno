schema_version: 1
project: inferno
phase: P11
phase_name: gpu_aware_browser_dashboard
status: LOCAL_GATES_PASSED_GPU_VALIDATION_PENDING
branch: phase/01-vllm-vertical-slice
comparison_scope: local_operator_dashboard
durable_state_owner: integrator
gpu_target:
  source: INFERNO_GPU_SSH or dashboard in-memory SSH target
  committed_literal_target: false
  required_during_p11_real_runs: true
real_engine_claims_allowed:
  existing_validated_artifact_claims: true
  p11_dashboard_validated_smoke_claims: true
  p11_ollama_deployment_profile: true
strict_engine_claims_with_llamacpp_allowed: false
strict_engine_claims_with_ollama_allowed: false
strict_engine_claims_with_tensorRT_llm_allowed: false
live_routing_allowed: false
local_dashboard_allowed: true
cloud_control_plane_allowed: false
required_gates:
  - uv sync --all-groups --frozen
  - uv run pytest -q
  - uv run ruff check src tests
  - npm install  # cwd: web/dashboard
  - npm run build  # cwd: web/dashboard
  - $env:PYTHONPATH='src'; uv run python -m inferno.cli dashboard --smoke --no-open
  - $env:PYTHONPATH='src'; uv run python -m inferno.cli compare --mode strict --runs "artifacts/studies/p5_smoke/latest.json artifacts/studies/profile_local/latest.json"
  - git diff --check
  - git diff --cached --check
expected_refusal_gates:
  - command: $env:PYTHONPATH='src'; uv run python -m inferno.cli compare --mode strict --runs "artifacts/studies/p5_smoke/latest.json artifacts/studies/profile_local/latest.json"
    expected_exit_code: 1
    expected_message: strict comparison rejects llamacpp; use MODE=deployment-profile
blocked_if:
  - dashboard_stores_literal_ssh_target
  - dashboard_exposes_public_live_endpoint
  - dashboard_becomes_cloud_control_plane
  - strict_mode_accepts_llamacpp_ollama_or_tensorRT_llm
  - ollama_or_tensorRT_results_reported_as_strict_engine_claims
  - t4_current_tensorRT_llm_failure_is_hidden_or_reported_as_readiness
  - p5_release_package_invalid
  - p6_deployment_profile_report_invalid
  - p7_planner_artifacts_invalid
  - p8_negative_result_hidden
  - p9_hardening_gate_fails
updated_by: integrator
prior_release:
  phase: P5
  status: INTEGRATED
  comparison_scope: strict_engine_comparison
  release_id: p5_research_core_v1
  package_manifest: artifacts/releases/p5_research_core_v1/redacted/manifest.json
prior_deployment_profile:
  phase: P6
  status: INTEGRATED
  comparison_scope: deployment_profile_comparison
  successful_run: artifacts/runs/p6-llamacpp-profile-local-r01-20260701T180433Z-6e6969f5
prior_planner:
