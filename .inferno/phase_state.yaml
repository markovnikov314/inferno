    engine: ollama
    comparison_scope: deployment_profile_comparison
    model: qwen3.5:2b
    config: configs/engines/ollama.json
  limitations:
    - P11 dashboard recommendations are evidence-aware warnings, not benchmark predictions.
    - Dashboard readiness labels require validated artifacts, not config presence.
    - SSH targets may be provided at runtime but must not be committed.
