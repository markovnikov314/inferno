schema_version: 1
required_fields:
  - task_id
  - phase
  - owner_role
  - base_commit
  - head_commit
  - owned_paths
  - forbidden_paths
  - commands
  - artifacts
  - limitations
  - next_task
command_fields:
  - command
  - exit_code
  - output_log
artifact_rule: artifacts must be redacted before commit
